services:
  users-service:
    build:
      context: ./services/users-service
    ports:
      - "3100:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVICE_NAME=users-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  orders-service:
    build:
      context: ./services/orders-service
    ports:
      - "3101:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SERVICE_NAME=orders-service
      - USERS_SERVICE_URL=http://users-service:3000
    depends_on:
      users-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
