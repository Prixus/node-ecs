services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dbadmin
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbadmin"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  users-service:
    build:
      context: ./services/users-service
    ports:
      - "3100:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVICE_NAME=users-service
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=platform
      - DB_USER=dbadmin
      - DB_PASSWORD=localpassword
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  orders-service:
    build:
      context: ./services/orders-service
    ports:
      - "3101:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SERVICE_NAME=orders-service
      - USERS_SERVICE_URL=http://users-service:3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=platform
      - DB_USER=dbadmin
      - DB_PASSWORD=localpassword
    depends_on:
      postgres:
        condition: service_healthy
      users-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
