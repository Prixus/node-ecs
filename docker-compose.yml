services:
  users-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: usersdb
    ports:
      - "5432:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  orders-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ordersdb
    ports:
      - "5433:5432"
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  users-service:
    build:
      context: ./services/users-service
    ports:
      - "3100:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVICE_NAME=users-service
      - DATABASE_URL=postgresql://postgres:postgres@users-db:5432/usersdb
    depends_on:
      users-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  orders-service:
    build:
      context: ./services/orders-service
    ports:
      - "3101:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SERVICE_NAME=orders-service
      - USERS_SERVICE_URL=http://users-service:3000
      - DATABASE_URL=postgresql://postgres:postgres@orders-db:5432/ordersdb
    depends_on:
      orders-db:
        condition: service_healthy
      users-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  users-db-data:
  orders-db-data:
