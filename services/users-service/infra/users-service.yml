AWSTemplateFormatVersion: '2010-09-09'
Description: users-service task definition, ECS service, and ALB routing rule

Parameters:
  EnvironmentName:
    Type: String
    Default: production
  ImageTag:
    Type: String
    Default: latest
  AccountId:
    Type: String
    Description: AWS account ID
  Region:
    Type: String
    Default: us-east-1

Resources:

  # ---- Task Definition ----
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: users-service
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn:
        Fn::ImportValue: !Sub ${EnvironmentName}-TaskExecutionRoleArn
      TaskRoleArn:
        Fn::ImportValue: !Sub ${EnvironmentName}-TaskRoleArn
      ContainerDefinitions:
        - Name: users-service
          Image: !Sub ${AccountId}.dkr.ecr.${Region}.amazonaws.com/users-service:${ImageTag}
          Essential: true
          PortMappings:
            - Name: users-service-port
              ContainerPort: 3000
              Protocol: tcp
              AppProtocol: http
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: '3000'
            - Name: SERVICE_NAME
              Value: users-service
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/users-service
              awslogs-region: !Ref Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command: [CMD-SHELL, "wget -qO- http://localhost:3000/health || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 10
          ReadonlyRootFilesystem: false
          StopTimeout: 30

  # ---- ALB Target Group ----
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvironmentName}-users-tg
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId:
        Fn::ImportValue: !Sub ${EnvironmentName}-VpcId
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # ---- ALB Listener Rule ----
  ListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn:
        Fn::ImportValue: !Sub ${EnvironmentName}-ALBListenerArn
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: ['/api/v1/users*']
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ---- ECS Service ----
  Service:
    Type: AWS::ECS::Service
    DependsOn: ListenerRule
    Properties:
      ServiceName: users-service
      Cluster:
        Fn::ImportValue: !Sub ${EnvironmentName}-ClusterName
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 2
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub ${EnvironmentName}-PrivateSubnet1
            - Fn::ImportValue: !Sub ${EnvironmentName}-PrivateSubnet2
          SecurityGroups:
            - Fn::ImportValue: !Sub ${EnvironmentName}-ECSSecurityGroup
          AssignPublicIp: DISABLED
      LoadBalancers:
        - TargetGroupArn: !Ref TargetGroup
          ContainerName: users-service
          ContainerPort: 3000
      HealthCheckGracePeriodSeconds: 60
      ServiceConnectConfiguration:
        Enabled: true
        Namespace: my-platform.local
        Services:
          - PortName: users-service-port
            DiscoveryName: users-service
            ClientAliases:
              - Port: 3000
                DnsName: users-service
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group: /ecs/service-connect/users-service
            awslogs-region: !Ref Region
            awslogs-stream-prefix: sc
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true

Outputs:
  ServiceName:
    Value: !GetAtt Service.Name
    Export:
      Name: !Sub ${EnvironmentName}-UsersServiceName
