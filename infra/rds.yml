AWSTemplateFormatVersion: '2010-09-09'
Description: RDS PostgreSQL instances and Secrets Manager secrets for users-service and orders-service

Parameters:
  EnvironmentName:
    Type: String
    Default: production
  DbPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: Master password for both RDS instances (min 16 chars)

Resources:

  # ---- DB Subnet Group (uses private subnets from vpc stack) ----
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for RDS instances
      SubnetIds:
        - Fn::ImportValue: !Sub ${EnvironmentName}-PrivateSubnet1
        - Fn::ImportValue: !Sub ${EnvironmentName}-PrivateSubnet2

  # ---- Security Group: allows 5432 inbound from ECS tasks only ----
  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Postgres inbound from ECS tasks
      VpcId:
        Fn::ImportValue: !Sub ${EnvironmentName}-VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId:
            Fn::ImportValue: !Sub ${EnvironmentName}-ECSSecurityGroup

  # ---- users-service RDS instance ----
  UsersDbInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub ${EnvironmentName}-users-db
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '16'
      MasterUsername: users_service
      MasterUserPassword: !Ref DbPassword
      DBName: usersdb
      AllocatedStorage: '20'
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: false
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      BackupRetentionPeriod: 7
      DeletionProtection: false
      PubliclyAccessible: false

  # ---- orders-service RDS instance ----
  OrdersDbInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub ${EnvironmentName}-orders-db
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '16'
      MasterUsername: orders_service
      MasterUserPassword: !Ref DbPassword
      DBName: ordersdb
      AllocatedStorage: '20'
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: false
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      BackupRetentionPeriod: 7
      DeletionProtection: false
      PubliclyAccessible: false

  # ---- Secrets Manager: full DATABASE_URL strings ----
  UsersDbSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${EnvironmentName}/users-service/database-url
      Description: Prisma DATABASE_URL for users-service
      SecretString: !Sub
        - "postgresql://users_service:${DbPassword}@${Host}:5432/usersdb"
        - Host: !GetAtt UsersDbInstance.Endpoint.Address

  OrdersDbSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${EnvironmentName}/orders-service/database-url
      Description: Prisma DATABASE_URL for orders-service
      SecretString: !Sub
        - "postgresql://orders_service:${DbPassword}@${Host}:5432/ordersdb"
        - Host: !GetAtt OrdersDbInstance.Endpoint.Address

Outputs:
  UsersDbSecretArn:
    Value: !Ref UsersDbSecret
    Export:
      Name: !Sub ${EnvironmentName}-UsersDbSecretArn

  OrdersDbSecretArn:
    Value: !Ref OrdersDbSecret
    Export:
      Name: !Sub ${EnvironmentName}-OrdersDbSecretArn

  RdsSecurityGroupId:
    Value: !Ref RdsSecurityGroup
    Export:
      Name: !Sub ${EnvironmentName}-RdsSecurityGroupId
