AWSTemplateFormatVersion: '2010-09-09'
Description: ECS cluster, IAM roles, shared ALB, Cloud Map namespace, and log groups

Parameters:
  EnvironmentName:
    Type: String
    Default: production

Resources:

  # ---- ECS Cluster ----
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${EnvironmentName}-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # ---- Cloud Map namespace (used by Service Connect) ----
  CloudMapNamespace:
    Type: AWS::ServiceDiscovery::HttpNamespace
    Properties:
      Name: my-platform.local
      Description: Service Connect namespace for inter-service DNS

  # ---- IAM Roles ----
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-ecsTaskExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-ecsTaskRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  # ---- Shared Application Load Balancer ----
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${EnvironmentName}-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - Fn::ImportValue: !Sub ${EnvironmentName}-PublicSubnet1
        - Fn::ImportValue: !Sub ${EnvironmentName}-PublicSubnet2
      SecurityGroups:
        - Fn::ImportValue: !Sub ${EnvironmentName}-ALBSecurityGroup

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '404'
            ContentType: application/json
            MessageBody: '{"error":"route not found"}'

  # ---- ECR Repositories ----
  # Created here (shared infra) so they exist before any service workflow pushes an image.
  UsersServiceECR:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    Properties:
      RepositoryName: users-service
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }

  OrdersServiceECR:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    Properties:
      RepositoryName: orders-service
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }

  # ---- CloudWatch Log Groups ----
  UsersServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/users-service
      RetentionInDays: 14

  OrdersServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/orders-service
      RetentionInDays: 14

  UsersServiceConnectLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/service-connect/users-service
      RetentionInDays: 14

  OrdersServiceConnectLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/service-connect/orders-service
      RetentionInDays: 14

Outputs:
  ClusterName:
    Value: !Ref ECSCluster
    Export:
      Name: !Sub ${EnvironmentName}-ClusterName

  TaskExecutionRoleArn:
    Value: !GetAtt TaskExecutionRole.Arn
    Export:
      Name: !Sub ${EnvironmentName}-TaskExecutionRoleArn

  TaskRoleArn:
    Value: !GetAtt TaskRole.Arn
    Export:
      Name: !Sub ${EnvironmentName}-TaskRoleArn

  ALBDnsName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub ${EnvironmentName}-ALBDnsName

  ALBListenerArn:
    Value: !Ref ALBListener
    Export:
      Name: !Sub ${EnvironmentName}-ALBListenerArn

  TaskExecutionRoleName:
    Value: !Ref TaskExecutionRole
    Export:
      Name: !Sub ${EnvironmentName}-TaskExecutionRoleName

  CloudMapNamespaceName:
    Value: !GetAtt CloudMapNamespace.Name
    Export:
      Name: !Sub ${EnvironmentName}-CloudMapNamespaceName
